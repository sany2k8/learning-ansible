---
- name: Runtime — Node.js via NVM
  hosts: all
  become: true
  vars:
    nodejs_version: "20"
  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name: [curl, ca-certificates, gnupg]
        state: present
        update_cache: true

    - name: Add NodeSource GPG key
      ansible.builtin.apt_key:
        url: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
        state: present

    - name: Add NodeSource repository
      ansible.builtin.apt_repository:
        repo: "deb https://deb.nodesource.com/node_{{ nodejs_version }}.x nodistro main"
        state: present

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Install common global npm packages
      community.general.npm:
        name: "{{ item }}"
        global: true
        state: present
      loop: [pm2, yarn, typescript]
...
