---
- name: Scenario — Standalone Portainer Docker Management Setup
  hosts: all
  become: true
  tasks:
    - name: Ensure Portainer data volume is present
      community.docker.docker_volume:
        name: portainer_data
        state: present

    - name: Run Portainer Community Edition container
      community.docker.docker_container:
        name: portainer
        image: portainer/portainer-ce:latest
        state: started
        restart_policy: always
        published_ports:
          - "9000:9000"
          - "9443:9443"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - portainer_data:/data

    - name: Open Portainer ports in UFW firewall
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "9000"
        - "9443"
...
