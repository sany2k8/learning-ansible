---
- name: Scenario — Standalone K3s Kubernetes Setup
  hosts: all
  become: true
  tasks:
    - name: Download and run K3s installation script
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure K3s service is started and enabled
      ansible.builtin.service:
        name: k3s
        state: started
        enabled: true

    - name: Wait for system kubeconfig to be generated
      ansible.builtin.wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        state: present
        timeout: 30

    - name: Create local user .kube configuration directory
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'

    - name: Copy kubeconfig to user's home directory
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Replace default server IP with localhost in copied config
      ansible.builtin.replace:
        path: "/home/{{ ansible_user }}/.kube/config"
        regexp: '127.0.0.1'
        replace: 'localhost'
...
