---
- name: VPN — Install and Configure Tailscale client mesh VPN
  hosts: all
  become: true
  tasks:
    - name: Install Tailscale signing key
      ansible.builtin.apt_key:
        url: https://pkgs.tailscale.com/stable/ubuntu/jammy.noarmor.gpg
        state: present

    - name: Add Tailscale apt repository
      ansible.builtin.apt_repository:
        repo: "deb https://pkgs.tailscale.com/stable/ubuntu jammy main"
        state: present

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

    - name: Ensure Tailscale service runs
      ansible.builtin.service:
        name: tailscaled
        state: started
        enabled: true
...