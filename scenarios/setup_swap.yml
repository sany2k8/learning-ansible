---
- name: Infrastructure Scenario — Configure Swap File (OOM Prevention)
  hosts: all
  become: true
  vars:
    swap_file_path: "/swapfile"
    swap_size_mb: 2048                 # 2GB Swap space
  tasks:
    - name: Check if swap space is already active
      ansible.builtin.command: swapon --show
      register: swapon_out
      changed_when: false

    - name: Create swap file if not active
      when: swap_file_path not in swapon_out.stdout
      block:
        - name: Allocate memory for swapfile
          ansible.builtin.command: "dd if=/dev/zero of={{ swap_file_path }} bs=1M count={{ swap_size_mb }}"
          args:
            creates: "{{ swap_file_path }}"

        - name: Set correct permissions on swapfile
          ansible.builtin.file:
            path: "{{ swap_file_path }}"
            mode: '0600'
            owner: root
            group: root

        # The enclosing block only runs when this swap file is not already
        # active, so reaching either task always means a real change.
        - name: Format the swap file
          ansible.builtin.command: "mkswap {{ swap_file_path }}"
          changed_when: true

        - name: Activate the swap file
          ansible.builtin.command: "swapon {{ swap_file_path }}"
          changed_when: true

    - name: Persist swap file activation in /etc/fstab
      ansible.posix.mount:
        path: none
        src: "{{ swap_file_path }}"
        fstype: swap
        opts: sw
        state: present
...
