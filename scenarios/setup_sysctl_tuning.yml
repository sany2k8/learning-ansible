---
- name: Infrastructure Scenario — Linux System Tuning (sysctl & limits)
  hosts: all
  become: true
  tasks:
    - name: Configure sysctl parameters for performance tuning
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        # Increase max file descriptors
        - { name: 'fs.file-max', value: '2097152' }
        # Decrease virtual memory swappiness
        - { name: 'vm.swappiness', value: '10' }
        # Increase maximum socket connections queued
        - { name: 'net.core.somaxconn', value: '65535' }
        # TCP window size and memory limits tuning
        - { name: 'net.ipv4.tcp_max_syn_backlog', value: '8192' }
        - { name: 'net.ipv4.ip_local_port_range', value: '1024 65535' }

    - name: Configure system-wide limits for open files descriptors
      ansible.builtin.copy:
        content: |
          # Limits configured by Ansible
          *               soft    nofile          65535
          *               hard    nofile          65535
          root            soft    nofile          65535
          root            hard    nofile          65535
        dest: /etc/security/limits.d/99-ansible-limits.conf
        mode: '0644'
...
