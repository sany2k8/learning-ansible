---
- name: Web Server Scenario — Standalone Apache HTTP Setup
  hosts: all
  become: true
  vars:
    apache_port: 8080
    apache_doc_root: "/var/www/html"
  tasks:
    - name: Install Apache2
      ansible.builtin.apt:
        name: apache2
        state: present
        update_cache: true

    - name: Configure Apache to listen on alternative port
      ansible.builtin.lineinfile:
        path: /etc/apache2/ports.conf
        regexp: '^Listen\s+.*'
        line: "Listen {{ apache_port }}"
        state: present
      notify: Restart Apache

    - name: Deploy basic virtual host configuration
      ansible.builtin.copy:
        content: |
          <VirtualHost *:{{ apache_port }}>
              ServerAdmin webmaster@localhost
              DocumentRoot {{ apache_doc_root }}

              ErrorLog ${APACHE_LOG_DIR}/error.log
              CustomLog ${APACHE_LOG_DIR}/access.log combined
          </VirtualHost>
        dest: /etc/apache2/sites-available/000-default.conf
        mode: '0644'
      notify: Restart Apache

    - name: Deploy index.html page
      ansible.builtin.copy:
        content: "<h1>Welcome to Apache hosted on port {{ apache_port }}!</h1>"
        dest: "{{ apache_doc_root }}/index.html"
        mode: '0644'

    - name: Ensure Apache2 is running and enabled
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: true

  handlers:
    - name: Restart Apache
      ansible.builtin.service:
        name: apache2
        state: restarted
...
