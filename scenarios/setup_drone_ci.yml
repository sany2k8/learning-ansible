---
- name: CI/CD — Drone CI via Docker
  hosts: all
  become: true
  tasks:
    - name: Run Drone Server container
      community.docker.docker_container:
        name: drone
        image: drone/drone:2
        state: started
        restart_policy: always
        published_ports:
          - "8000:80"
          - "8443:443"
        env:
          DRONE_GITEA_SERVER: "http://localhost:3000"
          DRONE_GITEA_CLIENT_ID: "your-client-id"
          DRONE_GITEA_CLIENT_SECRET: "your-client-secret"
          DRONE_RPC_SECRET: "super-secret-rpc-key"
          DRONE_SERVER_HOST: "localhost:8000"
          DRONE_SERVER_PROTO: "http"
        volumes:
          - drone_data:/data

    - name: Run Drone Runner container
      community.docker.docker_container:
        name: drone-runner
        image: drone/drone-runner-docker:1
        state: started
        restart_policy: always
        env:
          DRONE_RPC_PROTO: "http"
          DRONE_RPC_HOST: "drone"
          DRONE_RPC_SECRET: "super-secret-rpc-key"
          DRONE_RUNNER_CAPACITY: "2"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
...
