---
- name: Web Server — Caddy with Automatic HTTPS
  hosts: all
  become: true
  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name: [debian-keyring, debian-archive-keyring, apt-transport-https, curl]
        state: present
        update_cache: true

    - name: Add Caddy GPG key
      ansible.builtin.apt_key:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        state: present

    - name: Add Caddy repository
      ansible.builtin.apt_repository:
        repo: "deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
        state: present

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present
        update_cache: true

    - name: Deploy Caddyfile configuration
      ansible.builtin.copy:
        content: |
          :80 {
              respond "Hello from Caddy on {system.hostname}!" 200
          }
        dest: /etc/caddy/Caddyfile
        mode: '0644'
      notify: Reload Caddy

    - name: Ensure Caddy is running and enabled
      ansible.builtin.service:
        name: caddy
        state: started
        enabled: true

  handlers:
    - name: Reload Caddy
      ansible.builtin.service:
        name: caddy
        state: reloaded
...
