---
- name: Git — Bare Git Server Configuration
  hosts: all
  become: true
  tasks:
    - name: Ensure git package is present
      ansible.builtin.package:
        name: git
        state: present

    - name: Create git system user
      ansible.builtin.user:
        name: git
        shell: /usr/bin/git-shell
        state: present

    # ansible.builtin.git requires a 'repo' to clone from, so it cannot
    # initialise a brand-new empty bare repo. 'creates' provides idempotency.
    - name: Create bare repository
      ansible.builtin.command: git init --bare /home/git/project.git  # noqa: command-instead-of-module
      args:
        creates: /home/git/project.git

    - name: Set ownership of project repo to git user
      ansible.builtin.file:
        path: /home/git/project.git
        owner: git
        group: git
        recurse: true
...
