---
- name: Mail — Setup Postfix MTA (Send-Only)
  hosts: all
  become: true
  tasks:
    - name: Preseed postfix debconf configuration
      ansible.builtin.debconf:
        name: postfix
        question: "{{ item.question }}"
        value: "{{ item.value }}"
        vtype: select
      loop:
        - { question: 'postfix/main_mailer_type', value: 'Internet Site' }
        - { question: 'postfix/mailname', value: '{{ ansible_hostname }}' }

    - name: Install postfix mail client
      ansible.builtin.apt:
        name: [postfix, mailutils]
        state: present
...