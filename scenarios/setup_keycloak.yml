---
- name: Authentication — Keycloak Identity Management via Docker
  hosts: all
  become: true
  tasks:
    - name: Run Keycloak container
      community.docker.docker_container:
        name: keycloak
        image: quay.io/keycloak/keycloak:latest
        state: started
        restart_policy: always
        published_ports:
          - "8082:8080"
        env:
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin_password_123
        command: start-dev
...